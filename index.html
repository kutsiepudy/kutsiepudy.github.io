<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kristin's Lil Ipod</title>
</head>
<body>
  <div class="player">
    <div class="details">
      <div class="track-name">This Charming Man</div>
      <div class="track-artist">The Smiths</div>
      <div class="release-date">1983</div>
      <div class="description"></div>
    </div>

    <div class="buttons">
      <button onclick="previousTrack()">⏮</button>
      <button id="play-pause" onclick="playPauseTrack()">▶︎</button>
      <button onclick="nextTrack()">⏭</button>
    </div>

    <div class="sliders">
      <label>Seek</label>
      <input type="range" min="0" max="100" value="0" class="seek_slider" onchange="seekTo()" aria-label="Seek">
      <label>Volume</label>
      <input type="range" min="0" max="100" value="100" class="volume_slider" onchange="setVolume()" aria-label="Volume">
    </div>
    <audio id="main-audio"></audio>
  </div>
  <script src="main.js"></script>
</body>
</html>
