<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Music Player</title>
</head>
<body>
  <div class="player">
    <div class="details">
      <div class="track-name">This Charming Man</div>
      <div class="track-artist">The Smiths</div>
      <div class="release-date">1983</div>
    </div>

    <div class="buttons">
      <button onclick="previousTrack()">⏮</button>
      <button id="play-pause" onclick="playPauseTrack()">▶︎</button>
      <button onclick="nextTrack()">⏭</button>
    </div>

    <div class="sliders">
      <input type="range" min="0" max="100" value="0" class="seek_slider" onchange="seekTo()">
      <input type="range" min="0" max="100" value="100" class="volume_slider" onchange="setVolume()">
    </div>
    <audio id="main-audio" src="ThisCharmingMan.mp3"></audio>
  </div>
  <script src="script.js"></script>
</body>
</html>
